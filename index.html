<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartGPS · Consultas</title>
  <meta name="description" content="Consulta em qual servidor um login está e quem é o admin acima dele (checklogin)." />
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --border: #e3e8f0;
      --text: #1a2330;
      --muted: #67707f;
      --brand: #1e63d6;
      --brand-dark: #164da8;
      --ok: #128a4e;
      --ok-bg: #e6f6ee;
      --warn: #b26a00;
      --warn-bg: #fdf2df;
      --err: #c0362c;
      --err-bg: #fdeceb;
      --radius: 14px;
      --shadow: 0 1px 2px rgba(20,30,50,.04), 0 8px 24px rgba(20,30,50,.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f141c;
        --card: #171e29;
        --border: #27313f;
        --text: #e8edf5;
        --muted: #97a2b4;
        --brand: #4f8bf0;
        --brand-dark: #3a6fd0;
        --ok: #4ecb86;
        --ok-bg: #14311f;
        --warn: #e0a13a;
        --warn-bg: #35280f;
        --err: #f0857b;
        --err-bg: #351816;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }
    .wrap { width: 100%; max-width: 620px; }
    header { text-align: center; margin-bottom: 28px; }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 15px; letter-spacing: .3px;
      color: var(--brand);
    }
    .logo .dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--brand); box-shadow: 0 0 0 4px rgba(30,99,214,.15);
    }
    h1 { font-size: 25px; margin: 14px 0 6px; letter-spacing: -.4px; }
    header p { color: var(--muted); margin: 0; font-size: 14px; }

    form {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .field { position: relative; flex: 1; }
    .field svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; color: var(--muted); pointer-events: none;
    }
    input[type="text"] {
      width: 100%; padding: 14px 14px 14px 42px;
      font-size: 16px; color: var(--text);
      background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(30,99,214,.15);
    }
    button.submit {
      padding: 0 22px; font-size: 15px; font-weight: 600;
      color: #fff; background: var(--brand);
      border: none; border-radius: var(--radius); cursor: pointer;
      transition: background .15s; white-space: nowrap;
    }
    button.submit:hover { background: var(--brand-dark); }
    button.submit:disabled { opacity: .6; cursor: not-allowed; }

    .hint { text-align: center; color: var(--muted); font-size: 13px; margin: -8px 0 22px; }

    /* seções (Login / IMEI) numa tela só */
    .group { margin-bottom: 6px; }
    .group + .group { margin-top: 26px; padding-top: 24px; border-top: 1px solid var(--border); }
    .group-head { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
    .group-head h2 { font-size: 17px; margin: 0; letter-spacing: -.2px; }
    .group-sub { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
    .soon {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
      background: var(--warn-bg); color: var(--warn);
    }
    .group.disabled { opacity: .7; }
    input:disabled, button.submit:disabled { cursor: not-allowed; }
    input:disabled { background: var(--bg); color: var(--muted); -webkit-text-fill-color: var(--muted); }

    /* result */
    #result:empty { display: none; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 20px; margin-bottom: 14px;
      animation: rise .2s ease;
    }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .card .top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 14px;
    }
    .server {
      display: inline-flex; align-items: center; gap: 9px;
      font-size: 13px; color: var(--muted);
    }
    .server .srv-label {
      font-size: 15px; color: var(--text); font-weight: 600; letter-spacing: .2px;
    }
    .server .imei-val {
      font-size: 15px; color: var(--text); font-weight: 700; letter-spacing: .3px;
      font-variant-numeric: tabular-nums;
    }
    .code {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 42px; height: 30px; padding: 0 10px;
      background: rgba(30,99,214,.1); color: var(--brand);
      border-radius: 9px; font-weight: 800; font-size: 15px; letter-spacing: .5px;
    }
    @media (prefers-color-scheme: dark) { .code { background: rgba(79,139,240,.15); } }
    .codes { display: inline-flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 999px;
      font-size: 12.5px; font-weight: 600; white-space: nowrap;
    }
    .badge.ok { background: var(--ok-bg); color: var(--ok); }
    .badge.warn { background: var(--warn-bg); color: var(--warn); }
    .badge .d { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    .rows { display: grid; gap: 2px; }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 11px 0; border-top: 1px solid var(--border);
    }
    .row:first-child { border-top: none; }
    .row .k { color: var(--muted); font-size: 13.5px; }
    .row .v { font-weight: 600; text-align: right; word-break: break-word; }
    .row .v.email { font-weight: 500; }
    .copy {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 3px 9px; font-size: 12px; cursor: pointer;
      margin-left: 8px; transition: all .15s; vertical-align: middle;
    }
    .copy:hover { color: var(--brand); border-color: var(--brand); }

    .muted-note {
      color: var(--muted); font-size: 13px; padding: 4px 0 0;
    }

    /* states */
    .state {
      text-align: center; padding: 26px 20px; color: var(--muted);
      background: var(--card); border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .state.err { border-style: solid; background: var(--err-bg); color: var(--err); border-color: transparent; }
    .state .big { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .state.err .big { color: var(--err); }
    .spinner {
      width: 22px; height: 22px; margin: 0 auto 10px;
      border: 3px solid var(--border); border-top-color: var(--brand);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    details.raw {
      margin-top: 6px; font-size: 13px;
    }
    details.raw summary {
      cursor: pointer; color: var(--muted); user-select: none;
      list-style: none; display: inline-flex; align-items: center; gap: 6px;
    }
    details.raw summary::-webkit-details-marker { display: none; }
    details.raw summary::before { content: "▸"; font-size: 11px; }
    details.raw[open] summary::before { content: "▾"; }
    details.raw pre {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; overflow: auto;
      font-size: 12.5px; color: var(--text); margin: 8px 0 0;
    }

    footer {
      margin-top: 30px; text-align: center; color: var(--muted); font-size: 12px;
    }
    footer code {
      background: var(--card); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 6px; font-size: 11.5px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><span class="dot"></span> SmartGPS</div>
      <h1>Consultas</h1>
      <p>Consulte um login ou um IMEI nos servidores.</p>
    </header>

    <!-- Consulta Login -->
    <section class="group">
      <div class="group-head"><h2>Login</h2></div>
      <p class="group-sub">Em qual servidor o login está e quem é o admin acima dele.</p>
      <form id="loginForm" autocomplete="off">
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          <input type="text" id="login" name="login" placeholder="Digite o login (ex.: demosp)" autofocus />
        </div>
        <button type="submit" class="submit" id="loginBtn">Consultar</button>
      </form>
      <div id="loginResult" aria-live="polite"></div>
    </section>

    <!-- Consulta IMEI (em breve) -->
    <section class="group disabled">
      <div class="group-head">
        <h2>IMEI</h2>
        <span class="soon">Em breve</span>
      </div>
      <p class="group-sub">Consulta de IMEI nos servidores — em desenvolvimento.</p>
      <form id="imeiForm" autocomplete="off" onsubmit="return false">
        <div class="field">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
          <input type="text" id="imei" placeholder="Disponível em breve" disabled />
        </div>
        <button type="button" class="submit" id="imeiBtn" disabled>Consultar</button>
      </form>
    </section>

    <footer>
      Endpoint: <code>__external/checklogin/{login}</code>
    </footer>
  </div>

  <script>
    // ---- Config ----------------------------------------------------------
    const API_LOGIN_BASE = "https://api-sp.smartgps.com.br/__external/checklogin";

    // ---- Elements --------------------------------------------------------
    const loginForm = document.getElementById("loginForm");
    const loginInput = document.getElementById("login");
    const loginBtn = document.getElementById("loginBtn");
    const loginResult = document.getElementById("loginResult");

    // ---- Helpers ---------------------------------------------------------
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));

    function render(html) { loginResult.innerHTML = html; }

    function loading(term) {
      render(`<div class="state"><div class="spinner"></div>Consultando <b>${esc(term)}</b>…</div>`);
    }

    function stateError(msg) {
      render(`<div class="state err">
        <div class="big">Erro na consulta</div>
        <div>${esc(msg)}</div>
      </div>`);
    }

    function stateLoginNotFound(login) {
      render(`<div class="state">
        <div class="big">Login não encontrado</div>
        <div>Nenhum usuário <b>${esc(login)}</b> localizado nos servidores.</div>
      </div>`);
    }

    function appendRaw(data) {
      const pre = `<details class="raw"><summary>Ver resposta bruta (JSON)</summary><pre>${esc(JSON.stringify(data, null, 2))}</pre></details>`;
      loginResult.insertAdjacentHTML("beforeend", pre);
    }

    // ---- Fetch -----------------------------------------------------------
    let inFlight = null;

    async function fetchJson(url) {
      if (inFlight) inFlight.abort();
      const ctrl = new AbortController();
      inFlight = ctrl;
      try {
        const res = await fetch(url, { signal: ctrl.signal, headers: { "Accept": "application/json" } });
        const text = await res.text();
        try { return { data: JSON.parse(text) }; }
        catch { return { err: "Resposta inválida do servidor (não é JSON)." }; }
      } catch (e) {
        if (e.name === "AbortError") return { aborted: true };
        return { err: "Não foi possível conectar à API. Verifique a conexão." };
      } finally {
        if (inFlight === ctrl) { inFlight = null; loginBtn.disabled = false; }
      }
    }

    // ---- Consulta: LOGIN -------------------------------------------------
    function serverCard(code, info) {
      const hasAdmin = !!info.has_admin_above;
      const admin = info.admin || null;

      const badge = hasAdmin
        ? `<span class="badge warn"><span class="d"></span> Possui admin acima</span>`
        : `<span class="badge ok"><span class="d"></span> Conta principal</span>`;

      let adminRows = "";
      if (admin && (admin.client_name || admin.email)) {
        const emailBtn = admin.email
          ? `<button class="copy" data-copy="${esc(admin.email)}" type="button">copiar</button>` : "";
        adminRows = `
          <div class="row">
            <span class="k">Admin (cliente)</span>
            <span class="v">${esc(admin.client_name || "—")}</span>
          </div>
          <div class="row">
            <span class="k">E-mail do admin</span>
            <span class="v email">${esc(admin.email || "—")}${emailBtn}</span>
          </div>`;
      } else if (hasAdmin) {
        adminRows = `<div class="row"><span class="k">Admin acima</span><span class="v">Sim (sem detalhes)</span></div>`;
      } else {
        adminRows = `<div class="muted-note">Este login é a conta principal — não há admin acima dele.</div>`;
      }

      return `<div class="card">
        <div class="top">
          <span class="server">
            <span class="code">${esc(code)}</span>
            <span class="srv-label">Servidor</span>
          </span>
          ${badge}
        </div>
        <div class="rows">${adminRows}</div>
      </div>`;
    }

    async function queryLogin(login) {
      login = login.trim();
      if (!login) { loginInput.focus(); return; }
      loading(login);
      loginBtn.disabled = true;

      const r = await fetchJson(`${API_LOGIN_BASE}/${encodeURIComponent(login)}`);
      if (r.aborted) return;
      if (r.err) { stateError(r.err); return; }
      const data = r.data;

      if (data && data.error) { stateLoginNotFound(login); appendRaw(data); return; }

      const servers = Object.entries(data || {}).filter(
        ([, v]) => v && typeof v === "object" && "has_admin_above" in v
      );
      if (servers.length === 0) { stateError("Formato de resposta inesperado."); appendRaw(data); return; }

      render(servers.map(([code, info]) => serverCard(code, info)).join(""));
      appendRaw(data);
    }

    // ---- Events ----------------------------------------------------------
    loginForm.addEventListener("submit", (e) => { e.preventDefault(); queryLogin(loginInput.value); });

    loginResult.addEventListener("click", async (e) => {
      const b = e.target.closest("[data-copy]");
      if (!b) return;
      try {
        await navigator.clipboard.writeText(b.getAttribute("data-copy"));
        const old = b.textContent; b.textContent = "copiado!";
        setTimeout(() => { b.textContent = old; }, 1200);
      } catch { /* ignora */ }
    });

    // ---- Init: ?login=xxx na URL (link direto) ---------------------------
    const qLogin = new URLSearchParams(location.search).get("login");
    if (qLogin) { loginInput.value = qLogin; queryLogin(qLogin); }
  </script>
</body>
</html>
